name: Refresh SEO Assets

on:
  push:
    branches: [ main ]
    paths:
      - 'catalog-sheet-sync.js'
      - 'scripts/generate_seo_assets.py'
      - '.github/workflows/refresh-seo-assets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate robots.txt and sitemap.xml
        run: python3 scripts/generate_seo_assets.py

      - name: Commit refreshed SEO assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add robots.txt sitemap.xml
          git diff --cached --quiet || git commit -m "Refresh SEO crawl assets"
          git push
