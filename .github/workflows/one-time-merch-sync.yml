name: One-time merch sync

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  patch-site:
    if: contains(github.event.head_commit.message, 'Run one-time merch sync patch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch merch updates
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64

          asset_b64 = ''''''

          image_path = Path('assets/Lables and stickers/beach_volleyball_showdown_with_lively_vials.webp')
          image_path.parent.mkdir(parents=True, exist_ok=True)
          image_path.write_bytes(base64.b64decode(asset_b64))

          index_path = Path('index.html')
          text = index_path.read_text()
          replacements = {
            '<p class="eyebrow">Featured Merch Drop</p>': '<p class="eyebrow">Hat</p>',
            '<p>Premium navy snapback with the Jonezie Labs neon mark across the front panel. Built as a statement merch piece that matches the brand identity and gives the storefront a clean flagship wearable.</p>\n': '',
            '<p class="eyebrow">New Merch Add-On</p>': '<p class="eyebrow">Sticker</p>',
            '<p>A smaller add-on that keeps the mascot side of the brand visible while the product catalog stays front and center.</p>\n': '',
            '<span>Price: $5.00</span>': '<span>Price: $3.00</span>',
            'data-merch-price="5.00"': 'data-merch-price="3.00"',
            '<img src="hot-girl-summer-sticker.png" alt="Hot Girl Summer sticker" />': '<img src="hot-girl-summer-sticker.png" alt="Hot Girl Summer sticker" onerror="this.closest(\'.sticker-art\').classList.add(\'is-missing-art\')" />',
            '<p class="eyebrow">New Merch Drop</p>': '<p class="eyebrow">Shirt</p>',
            '<p>Clean white pocket tee with the full back graphic from the Hot Girl Summer drop. Built as a standout seasonal piece that carries the Jonezie energy in a wearable format.</p>\n': ''
          }
          for old, new in replacements.items():
            text = text.replace(old, new)

          shirt_marker = '<article class="merch-product">\n            <div class="merch-card" data-merch-zoom role="button" tabindex="0" aria-label="Open larger image of Hot Girl Summer shirt">'
          text = text.replace(shirt_marker, shirt_marker.replace('merch-product', 'merch-product merch-product-wide'), 1)

          summer_card = '''          <article class="merch-product merch-product-sticker">
            <div class="sticker-art" data-merch-zoom role="button" tabindex="0" aria-label="Open larger image of Summer Stack Bros sticker">
              <img src="assets/Lables%20and%20stickers/beach_volleyball_showdown_with_lively_vials.webp" alt="Summer Stack Bros sticker" onerror="this.closest('.sticker-art').classList.add('is-missing-art')" />
            </div>
            <div class="merch-copy compact-copy">
              <p class="eyebrow">Sticker</p>
              <h3>Summer Stack Bros</h3>
              <div class="merch-meta">
                <span>Price: $3.00</span>
                <span>Sticker format</span>
              </div>
              <div class="merch-purchase" data-merch-purchase data-merch-slug="summer-stack-bros-sticker" data-merch-name="Summer Stack Bros Sticker" data-merch-image="assets/Lables%20and%20stickers/beach_volleyball_showdown_with_lively_vials.webp" data-merch-price="3.00">
                <div class="merch-purchase-row">
                  <label>Format</label>
                  <select data-merch-size>
                    <option value="Standard">Standard</option>
                  </select>
                </div>
                <div class="merch-purchase-row">
                  <label>Quantity</label>
                  <div class="merch-qty-control">
                    <button type="button" data-merch-qty-minus aria-label="Decrease quantity">-</button>
                    <input data-merch-qty type="number" min="1" value="1" inputmode="numeric" />
                    <button type="button" data-merch-qty-plus aria-label="Increase quantity">+</button>
                  </div>
                </div>
                <button class="button primary merch-add-button" type="button" data-merch-add>Add To Cart</button>
                <p class="merch-add-feedback" data-merch-feedback aria-live="polite"></p>
              </div>
            </div>
          </article>
'''
          if 'summer-stack-bros-sticker' not in text:
            insert_before = '          <article class="merch-product merch-product-wide">\n            <div class="merch-card" data-merch-zoom role="button" tabindex="0" aria-label="Open larger image of Hot Girl Summer shirt">'
            text = text.replace(insert_before, summer_card + insert_before, 1)
          index_path.write_text(text)

          css_path = Path('styles.css')
          css = css_path.read_text()
          if '.sticker-art.is-missing-art {' not in css:
            marker = '''.sticker-art img {
  width: min(100%, 240px);
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.28));
}
'''
            fallback = marker + '''
.sticker-art.is-missing-art {
  position: relative;
  min-height: 260px;
}

.sticker-art.is-missing-art img {
  display: none;
}

.sticker-art.is-missing-art::before {
  content: "Sticker art loading";
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 0 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.24);
  background: var(--ember-fill);
  color: #1f1d28;
  font-family: "Space Grotesk", sans-serif;
  font-size: 0.82rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
'''
            css = css.replace(marker, fallback, 1)
          if '.merch-product-wide {' not in css:
            marker = '''.merch-product {
  display: grid;
  grid-template-columns: minmax(240px, 0.82fr) minmax(0, 1.18fr);
  gap: 18px;
  align-items: center;
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(15,31,40,0.9), rgba(9,19,25,0.94));
  box-shadow: var(--shadow);
}
'''
            css = css.replace(marker, marker + '\n.merch-product-wide {\n  grid-column: 1 / -1;\n}\n', 1)
          css_path.write_text(css)

          Path('.github/workflows/one-time-merch-sync.yml').unlink(missing_ok=True)
          PY
      - name: Commit patched merch files
        run: |
          git config user.name "zvl1380-spec"
          git config user.email "274313913+zvl1380-spec@users.noreply.github.com"
          git add index.html styles.css "assets/Lables and stickers/beach_volleyball_showdown_with_lively_vials.webp" .github/workflows/one-time-merch-sync.yml
          git diff --cached --quiet || git commit -m "Publish merch sticker updates"
          git push
