name: One-time local site sync

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  patch-site:
    if: contains(github.event.head_commit.message, 'Run one-time local site sync patch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch local site updates
        run: |
          python3 <<'PY'
          from pathlib import Path

          checkout_css = '''
          .checkout-freebies {
            margin-top: 14px;
            padding: 14px 16px;
            border: 1px solid rgba(255, 95, 169, 0.18);
            border-radius: 18px;
            background:
              radial-gradient(circle at 10% 20%, rgba(40, 216, 239, 0.12), transparent 28%),
              radial-gradient(circle at 88% 18%, rgba(255, 95, 169, 0.14), transparent 30%),
              linear-gradient(180deg, rgba(18, 33, 41, 0.94), rgba(10, 20, 27, 0.98));
          }
          .checkout-freebies-label {
            display: inline-flex;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
          }
          .checkout-freebies-list {
            margin: 0;
            padding-left: 18px;
            color: var(--muted);
            display: grid;
            gap: 6px;
          }
          .checkout-freebies-list li::marker {
            color: var(--pink-soft);
          }
          '''.strip() + '\n'

          shipping_css = '''
          .checkout-shipping { margin-top: 14px; display: grid; gap: 8px; }
          .checkout-shipping label {
            color: var(--muted);
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
          }
          .checkout-shipping-select-shell {
            position: relative;
            border-radius: 18px;
            border: 1px solid rgba(98, 219, 240, 0.2);
            background:
              radial-gradient(circle at 85% 18%, rgba(255, 95, 169, 0.16), transparent 30%),
              radial-gradient(circle at 14% 18%, rgba(40, 216, 239, 0.14), transparent 28%),
              linear-gradient(180deg, rgba(16, 33, 43, 0.98), rgba(9, 20, 27, 0.98));
            box-shadow:
              inset 0 1px 0 rgba(255,255,255,0.05),
              0 18px 36px rgba(0,0,0,0.22);
          }
          .checkout-shipping-select-shell::after {
            content: "";
            position: absolute;
            top: 50%;
            right: 18px;
            width: 10px;
            height: 10px;
            border-right: 2px solid #8fe7ff;
            border-bottom: 2px solid #8fe7ff;
            transform: translateY(-60%) rotate(45deg);
            pointer-events: none;
            opacity: 0.9;
          }
          .checkout-shipping select {
            width: 100%;
            min-height: 48px;
            padding: 12px 48px 12px 16px;
            border-radius: 18px;
            border: 0;
            background: transparent;
            color: var(--text);
            font: inherit;
            font-weight: 700;
            line-height: 1.35;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            outline: none;
          }
          .checkout-shipping select:focus {
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
          }
          .checkout-shipping select:disabled {
            opacity: 0.6;
            cursor: not-allowed;
          }
          .checkout-shipping select option {
            color: #11202a;
            background: #f6efe4;
          }
          .checkout-shipping p {
            margin: 0;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.55;
          }
          .checkout-shipping p strong,
          .checkout-shipping label {
            color: var(--pink-soft);
          }
          '''.strip() + '\n'

          css_path = Path('styles.css')
          css = css_path.read_text()
          marker = '.checkout-promo { margin-top: 14px; display: grid; gap: 8px; }'
          if '.checkout-freebies {' not in css and marker in css:
            css = css.replace(marker, checkout_css + marker, 1)
          if '.checkout-shipping-select-shell {' not in css:
            form_marker = '.checkout-form { margin-top: 18px; padding: 18px; display: grid; gap: 14px; }'
            css = css.replace(form_marker, shipping_css + form_marker, 1)
          css = css.replace('.checkout-promo label {\n  color: var(--muted);', '.checkout-promo label {\n  color: var(--cyan-soft);')
          css = css.replace('.checkout-promo p strong {\n  color: var(--pink-soft);', '.checkout-promo p strong {\n  color: var(--cyan-soft);')
          css_path.write_text(css)

          for html_name in ('index.html', 'checkout.html'):
            path = Path(html_name)
            text = path.read_text()
            text = text.replace('catalog-image-overrides.js?v=20260424d', 'catalog-image-overrides.js?v=20260427d')
            text = text.replace('checkout.js?v=20260427a', 'checkout.js?v=20260428a')
            path.write_text(text)

          Path('.github/workflows/one-time-local-site-sync.yml').unlink(missing_ok=True)
          PY
      - name: Commit patched site files
        run: |
          git config user.name "zvl1380-spec"
          git config user.email "274313913+zvl1380-spec@users.noreply.github.com"
          git add styles.css index.html checkout.html .github/workflows/one-time-local-site-sync.yml
          git diff --cached --quiet || git commit -m "Publish checkout styling and index cache updates"
          git push
